- name: User Configuration
  hosts: user
  become: yes

  vars:
    PACKAGE: nodejs 

  tasks:
  - name: Disable Current Nodejs
    ansible.builtin.command: dnf module disable nodejs -y 

  - name: Enable nodejs:20 version
    ansible.builtin.command: dnf module enable nodejs:20 -y 

  - name: Install nodejs
    ansible.builtin.dnf:
      name: "{{ PACKAGE }}"
      state: present

  - name: Create roboshop system user
    ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      system: true
      comment: roboshop system user
  
  - name: Create Apllication home directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Download user content
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest: /tmp/user.zip

  - name: Unzip or Extract user content into user app home directory
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes

  - name: Install or Download dependencies
    community.general.npm:
      path: /app

  - name: copy user service to system directory
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: Reload the daemon 
    ansible.builtin.systemd_service:
      daemon_reload: true
  
  - name: Enable & Start the User Service 
    ansible.builtin.service:
      name: user
      state: started
      enabled: yes

  

