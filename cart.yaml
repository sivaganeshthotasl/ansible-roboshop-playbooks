- name: Cart Configuration
  hosts: cart 
  become: yes

  vars:
    PACKAGE: nodejs

  tasks:
  - name: Disable Current Nodejs Version
    ansible.builtin.command: dnf module disable nodejs -y 

  - name: Enable Nodejs 20 version
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: Install nodejs
    ansible.builtin.dnf:
      name: "{{ PACKAGE }}"
      state: present

  - name: Crate a roboshop system user
    ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      system: true
      comment: roboshop system user

  - name: Create a application home directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Download Cart content into tmp
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
      dest: /tmp/cart.zip

  - name: Extract or Unzip Cart content in application home directory
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes

  - name: Install or Download dependencies using npm
    community.general.npm:
      path: /app

  - name: Copy cart service into systemd 
    ansible.builtin.copy:
      src: cart.service
      dest: /etc/systemd/system/cart.service

  - name: Reload daemon
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Enable and start cart service
    ansible.builtin.service:
      name: cart
      state: started
      enabled: yes

      